{% load static %}
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ room.room_name }} - ルームロビー</title>
    <link rel="stylesheet" href="{% static 'game/style.css' %}">
    <link rel="stylesheet" href="{% static 'rooms/lobby.css' %}">
</head>

{% if need_password %}
<body class="race">
    <div id="header">
        <div id="title">{{ room.room_name }}<small>PASSWORD REQUIRED</small></div>
    </div>
    <div style="flex:1; display:flex; align-items:center; justify-content:center;">
        <div style="width:340px; background:#0e0e16; border:1px solid #223; padding:26px;">
            <h3 style="color:#00ff88; letter-spacing:2px; margin-bottom:16px;">🔒 パスワードが必要です</h3>
            <input type="password" id="pwInput" style="width:100%; padding:10px; background:#050508; border:1px solid #223; color:#e0e0e0; font-family:'Courier New',monospace; margin-bottom:14px;">
            <button id="pwSubmit" style="width:100%; padding:10px;">入室する</button>
        </div>
    </div>
    <script>
        document.getElementById('pwSubmit').addEventListener('click', () => {
            const pw = document.getElementById('pwInput').value;
            window.location.href = '?password=' + encodeURIComponent(pw);
        });
    </script>
</body>
{% else %}

<body class="race">
    <div id="header">
        <div id="title">{{ room.room_name }}<small>ROOM LOBBY</small></div>
        <div id="controls">
            <button id="readyBtn">準備完了</button>
            <button id="startBtn" style="display:none;">START ▶</button>
            <button id="leaveBtn">◀ 退室</button>
        </div>
    </div>

    <div id="main-layout">
        <div id="canvas-container">
            <div id="center-hud">
                <div id="lap-counter">MEMBERS <span id="memberCountLabel">0/4</span></div>
                <div id="race-status">対戦相手を待っています...</div>
            </div>
            <div id="countdown-overlay">
                <div id="countdown-num">3</div>
            </div>
        </div>

        <!-- メンバー一覧（4枠固定。空き枠にはBot追加ボタンを表示） -->
        <div id="hud-rankings"></div>

        <div id="commentary-panel">
            <div id="player-list-panel">
                <div id="player-list-header">
                    <div class="dot"></div>
                    YOUR BET
                </div>
                <div id="myBetRow" style="padding:10px 12px;">
                    <input type="range" id="betSlider" min="100" max="1000" step="50" value="100" style="width:100%;">
                    <div style="display:flex; justify-content:space-between; font-size:11px; color:#889; margin-top:4px;">
                        <span>100</span><span id="betVal" style="color:#ffdd33; font-weight:bold;">100</span><span>1000</span>
                    </div>
                </div>
                <div class="player-col-header">
                    <span>NAME</span><span>RATE</span><span>READY</span><span>BET</span>
                </div>
                <div id="player-list-body"></div>
            </div>

            <div id="commentary-wrap">
                <div id="commentary-header">
                    <div class="dot"></div>
                    ROOM CHAT
                </div>
                <div id="commentary-feed"></div>
                <div id="chat-area">
                    <div id="chat-label">CHAT</div>
                    <div id="chat-input-row">
                        <input type="text" id="chat-input" placeholder="メッセージ..." maxlength="60" />
                        <button id="chat-send">SEND</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.__ROOM_ID__ = "{{ room.room_id }}";
        window.__MY_USER_ID__ = {{ request.user.user_id }};
        window.__MY_USER_NAME__ = "{{ request.user.name }}";
    </script>
    <script src="{% static 'rooms/rooms.js' %}"></script>
</body>
{% endif %}

</html>
