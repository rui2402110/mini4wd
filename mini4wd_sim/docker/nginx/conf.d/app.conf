# docker/nginx/conf.d/app.conf
#
# 証明書取得後に使う本番用設定。HTTP(80番)は証明書更新用の
# acme-challengeパス以外を常にHTTPSへリダイレクトし、実際の通信は443番で
# 終端したうえでDaphne(web:8000)へリバースプロキシする。
# /ws/ 以下はWebSocketアップグレードに対応させている。

server {
    listen 80;
    server_name mini4wdsim.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name mini4wdsim.duckdns.org;

    client_max_body_size 10M;

    ssl_certificate     /etc/letsencrypt/live/mini4wdsim.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mini4wdsim.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    # WebSocket（room_consumer / race_consumer）
    location /ws/ {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # WebSocketは長時間張りっぱなしになるため、タイムアウトを長めに取る
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # 通常のHTTPリクエスト（Django側）
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
