# docker/nginx/conf.d-bootstrap/app.conf
#
# 初回セットアップ時、Let's Encrypt証明書を取得する「前」に使う一時設定。
# HTTPS証明書がまだ存在しない状態でHTTPSサーバーブロックを起動しようとすると
# Nginxが起動に失敗するため、まずはこのHTTP専用設定でサイトを立ち上げ、
# certbotによる証明書取得（webroot方式）を成功させてから、
# conf.d-bootstrap の内容を conf.d にコピーして本番用(SSL)設定に切り替える。
# 手順の詳細は「デプロイ手順書.txt」を参照。

server {
    listen 80;
    server_name mini4wdsim.duckdns.org;

    client_max_body_size 10M;

    # certbotのwebroot方式によるドメイン所有権確認用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    location /ws/ {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
